<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポモドーロタイマー</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      transition: background 0.8s ease;
    }
    body.break-mode { background: #0a2535; }

    .container {
      text-align: center;
      padding: 48px 56px;
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      min-width: 360px;
    }

    .mode-label {
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 12px;
      color: #ff8c42;
      transition: color 0.8s ease;
    }
    .mode-label.break { color: #26c6da; }

    h1 {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      font-weight: 400;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }

    .progress-ring-wrapper {
      position: relative;
      width: 240px;
      height: 240px;
      margin: 0 auto 40px;
    }
    .progress-ring { transform: rotate(-90deg); }
    .progress-ring__track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 8; }
    .progress-ring__progress {
      fill: none; stroke: #ff8c42; stroke-width: 8; stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.8s ease;
    }
    .progress-ring__progress.break { stroke: #26c6da; }

    .timer-display {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .time {
      font-size: 64px; font-weight: 200; color: #fff;
      letter-spacing: -2px; font-variant-numeric: tabular-nums; line-height: 1;
    }
    .session-count { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 6px; }

    .controls { display: flex; gap: 16px; justify-content: center; margin-bottom: 32px; }

    button {
      cursor: pointer; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600; transition: all 0.2s ease; font-family: inherit;
    }
    .btn-start { padding: 14px 48px; background: #ff8c42; color: #fff; letter-spacing: 1px; }
    .btn-start.break { background: #26c6da; }
    .btn-start:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-start:active { transform: translateY(0); opacity: 1; }
    .btn-reset { padding: 14px 24px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
    .btn-reset:hover { background: rgba(255,255,255,0.14); color: rgba(255,255,255,0.9); }

    .mode-tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
    .tab {
      padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: 500;
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4);
      cursor: pointer; border: none; font-family: inherit; transition: all 0.2s;
    }
    .tab.active-work  { background: rgba(255,140,66,0.25); color: #ff8c42; }
    .tab.active-break { background: rgba(38,198,218,0.25); color: #26c6da; }
    .tab:hover:not(.active-work):not(.active-break) {
      background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7);
    }

    .log { font-size: 12px; color: rgba(255,255,255,0.3); min-height: 20px; }

    .settings {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-top: 20px; flex-wrap: wrap;
    }
    .settings label {
      font-size: 13px; color: rgba(255,255,255,0.45);
      display: flex; align-items: center; gap: 6px;
    }
    .settings input[type="number"] {
      width: 56px; padding: 6px 8px; border-radius: 8px; border: none;
      background: rgba(255,255,255,0.1); color: #fff;
      font-size: 14px; font-weight: 600; text-align: center;
      font-family: inherit; outline: none;
    }
    .settings input[type="number"]:focus {
      background: rgba(255,255,255,0.18);
    }
    .btn-apply {
      padding: 7px 18px; border-radius: 20px; font-size: 13px;
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7);
      border: none; cursor: pointer; font-family: inherit;
      transition: all 0.2s;
    }
    .btn-apply:hover { background: rgba(255,255,255,0.18); color: #fff; }

    .notify-banner {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: #fff; color: #333; padding: 14px 28px; border-radius: 12px;
      font-size: 15px; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100; white-space: nowrap;
    }
    .notify-banner.show { transform: translateX(-50%) translateY(0); }

    .permission-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #2a2a3e; color: #fff; padding: 14px 20px;
      display: flex; align-items: center; justify-content: center;
      gap: 16px; font-size: 14px; z-index: 200;
    }
    .permission-bar button {
      padding: 8px 20px; font-size: 13px;
      background: #ff8c42; color: #fff; border-radius: 8px;
    }
    .permission-bar .btn-later {
      background: rgba(255,255,255,0.15);
    }
    .permission-bar.hidden { display: none; }
  </style>
</head>
<body>

  <div class="notify-banner" id="notifyBanner">🍅 タイマー終了！</div>

  <div class="permission-bar hidden" id="permissionBar">
    📳 画面OFF中の通知のために許可が必要です
    <button id="notifAllowBtn">許可する</button>
    <button class="btn-later" id="notifLaterBtn">後で</button>
  </div>

  <div class="container">
    <div class="mode-label" id="modeLabel">作業中</div>
    <h1>ポモドーロタイマー</h1>

    <div class="progress-ring-wrapper">
      <svg class="progress-ring" width="240" height="240" viewBox="0 0 240 240">
        <circle class="progress-ring__track" cx="120" cy="120" r="108"/>
        <circle class="progress-ring__progress" id="progressCircle" cx="120" cy="120" r="108"/>
      </svg>
      <div class="timer-display">
        <div class="time" id="timeDisplay">50:00</div>
        <div class="session-count" id="sessionCount">セッション 1</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-start" id="startBtn">開始</button>
      <button class="btn-reset" id="resetBtn">リセット</button>
    </div>

    <div class="mode-tabs">
      <button class="tab active-work" id="tabWork">🍅 作業 50分</button>
      <button class="tab"             id="tabBreak">☕ 休憩 10分</button>
    </div>

    <div class="log" id="logText"></div>

    <div class="settings">
      <label>
        🍅 作業
        <input type="number" id="inputWork" min="1" max="180" value="50"> 分
      </label>
      <label>
        ☕ 休憩
        <input type="number" id="inputBreak" min="1" max="60" value="10"> 分
      </label>
      <button class="btn-apply" id="applyBtn">適用</button>
    </div>

    <div style="margin-top: 12px;">
      <button class="tab" id="soundTestBtn" style="font-size:13px; padding:8px 20px;">
        🔊 通知音をテスト
      </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
